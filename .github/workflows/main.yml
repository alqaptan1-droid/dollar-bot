name: Run Dollar Bot
on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests cloudscraper beautifulsoup4
      - name: Run script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python dollar_bot.py
